name: automl-platform

services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

  mlflow:
    build: ./mlflow
    image: automl-platform-mlflow:latest
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_data:/mlflow
    command:
      [
        "mlflow",
        "server",
        "--backend-store-uri",
        "file:/mlflow/mlruns",
        "--default-artifact-root",
        "/mlflow/artifacts",
        "--serve-artifacts",
        "--host",
        "0.0.0.0",
        "--port",
        "5000",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5).read()\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  api:
    build: ./api
    env_file:
      - .env
      - ./api/.env
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/output
      GIT_PYTHON_REFRESH: ${GIT_PYTHON_REFRESH:-quiet}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 20s

  worker:
    build: ./worker
    hostname: worker
    env_file:
      - .env
      - ./worker/.env
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/output
      GIT_PYTHON_REFRESH: ${GIT_PYTHON_REFRESH:-quiet}
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    command:
      [
        "celery",
        "-A",
        "automl_worker.celery_app",
        "worker",
        "--loglevel=info",
        "--hostname=worker@worker",
        "--concurrency=1",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A automl_worker.celery_app inspect ping -d worker@worker --timeout=10 | grep -q OK",
        ]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 45s

volumes:
  mlflow_data:
